

{% extends "partials/base.html" %}

{% block title %}SIVM sivm{% endblock %}

{% block content %}



<h1>{{ commune.name }}</h1>

<div class="posts">

{% for post in posts %}

<div class="card">

    <h3>{{ post.title }}</h3>

    {% if post.image %}
        <img src="{{ url_for('static', filename='uploads/' ~ post.image) }}">
    {% endif %}

    <div>
        {{ post.content|safe }}
    </div>

</div>

{% else %}

<p>Aucun contenu pour le moment.</p>

{% endfor %}

</div>


{% endblock %}
