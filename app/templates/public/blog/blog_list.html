


{% extends "partials/base.html" %}


{% block content %}
<section class="blog-list-public">
    <div class="container">
        <h2>Actualités</h2>

        {% if posts %}
            {% for post in posts %}
            <div class=" card cards-container-blog">
                <h3>{{ post.title }}</h3>

                <p class="post-date">
                    {{ post.created_at.strftime('%d/%m/%Y') }}
                </p>

                <p>{{ post.content[:150] }}...</p>

                <a href="{{ url_for('blog.blog_post', post_id=post.id) }}" class="btn">
                    Voir
                </a>

            </div>
            {% endfor %}
        {% else %}
            <p>Pas encore de posts disponibles.</p>
        {% endif %}
    </div>
</section>
{% endblock %}
